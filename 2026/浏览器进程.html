  <body>
    <script>
      /**
       * TCP三次握手
       * 1、客户端主动打开发起SYN报文，表示连接请求，SYN = 1, seq=x
       * 2、服务端收到请求，给客户端返回确认信息，ACK = 1, SYN=1， seq = y, ack = x+1
       * 3、客户端收到了服务点确认信息，告诉服务端已做好准备，发送确认 ACk=1, ack = y+1, seq = x+1
       *
       * TCP四次挥手
       * 1、客户端主动发起FIN报文，FIN=1,seq=u,表示请求关闭连接
       * 2、server端收到关闭连接请求，回复确认ACK=1， seq = q, ack=u+1
       * 3、客户端等一段时间，服务端数据发送完之后给客户端发送确认关闭连接报文，FIN=1, ACK=1, seq= w, ack = u+1
       * 4、客户端确认关闭，ACK = 1, seq=u+1 ack= w+1
       *
       * HTTPS建立连接
       * 1 client hello 报文，密码套件、随机数A、tls版本信息
       * 2、server hello 确认tls版本、密码套件、随机数B
       * 3、想客户端发送数字证书
       * 4、客户端收到数字证书、用事先内置的CA公钥对证书进行解密，获取到证书签名和server的公钥
       * 随机数A和随机数B生成pre-master-key,用server的公钥进行加密传给server
       * 5、随机数A + 随机数B+ pre-master-key = session-key，通知server改用新的密钥进行通信
       * 6、server私钥解密获取pre-master-key，同样的随机数A+随机数B+pre-master-key = session=key，
       * 发送Chiper Change,
       * 双方使用新的密钥进行通信
       */
    </script>
  </body>
</html>
