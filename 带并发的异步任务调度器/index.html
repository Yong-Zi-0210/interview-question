    <body>
    <script>
        class Scheduler{
            constructor(max){
                this.max = max;
                this.queue = [];
                this.count = 0;
            }
            async add(promiseCreator){
                if(this.count >= this.max){
                    await new Promise((resolve,reject) => this.queue.push(resolve))
                }
                this.count ++
                const res = await promiseCreator()
                this.count --
                if(this.queue.length){
                    this.queue.shift()()
                }
                return res
            }
        }
        const timeout = (time) => new Promise(resolve => {
            setTimeout(()=>resolve(time),time)
        })
        const scheduler = new Scheduler(2)
        const addTask = (time,order) => {
            scheduler.add(()=>timeout(time)).then((res)=>{console.log(order,res)})
        }
        // addTask(1000, '1')
        // addTask(500, '2')
        // addTask(300, '3')
        // addTask(400, '4')




        class Scheduler2{
            constructor(max,asyncTaskList){
                this.max = max; // 最大并发数
                this.runing = []; // 正在执行的任务队列
                this.taskIndex = 0; // 当前执行的任务索引
                this.asyncTaskList = asyncTaskList;
                this.res = []
                this.runTask()
            }
            initTask(time){
                return new Promise(resolve=>{
                    setTimeout(() => {
                        resolve(time)
                    }, time);
                })
            }
            runTask(){
                if(this.taskIndex >= this.asyncTaskList.length){
                    return Promise.resolve()
                }
                const task = this.initTask(this.asyncTaskList[this.taskIndex++]);
                task.then(()=>{this.runing.splice(this.runing.indexOf(task),1)})
                this.runing.push(task);
                this.res.push(task)
                if(this.runing.length >= this.max){
                    return Promise.race(this.runing).then(()=>{
                        this.runTask()
                    });
                }

                this.runTask()
            }
            getResult(){
                return this.res
            }

        }
        const scheduler2 = new Scheduler2(2,[100,500,300,400])
        scheduler2.getResult()
    </script>
    </body>
